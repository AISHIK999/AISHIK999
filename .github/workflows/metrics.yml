name: Metrics
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
  push: { branches: ["master", "main"] }
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - name: WakaTime 7 Days
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          filename: wakatime_7days.svg
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_sections: time, projects, languages, editors
          plugin_wakatime_days: 7

      - name: WakaTime All-Time
        uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          filename: wakatime_alltime.svg
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_sections: time, languages
          plugin_wakatime_days: 0
